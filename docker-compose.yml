services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ledgerly_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www/src
      - ./public:/var/www/public
      - ./views:/var/www/views
      - ./routes:/var/www/routes
      - ./storage:/var/www/storage
      - ./.env:/var/www/.env
    networks:
      - ledgerly_net

  nginx:
    image: nginx:stable-alpine
    container_name: ledgerly_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ledgerly_net

  db:
    image: mysql:8.0
    container_name: ledgerly_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ledgerly
      MYSQL_USER: ledgerly
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ledgerly_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ledgerly_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - ledgerly_net

volumes:
  db_data:

networks:
  ledgerly_net:
